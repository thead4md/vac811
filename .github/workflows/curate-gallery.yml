name: Curate Gallery from Google Drive

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'Comma-separated year folders to process (e.g. 2026,2025,2024). Leave blank for current + previous year.'
        required: false
        default: ''
      max_primary:
        description: 'Max photos from the primary (tábor) event per year'
        required: false
        default: '12'
      max_minor:
        description: 'Max photos from each minor event'
        required: false
        default: '1'
      preflight:
        description: 'Enable OpenAI gpt-4o-mini pre-filter (true/false)'
        required: false
        default: 'true'
      score_threshold:
        description: 'Min score for primary event photos (0–100)'
        required: false
        default: '50'
      minor_threshold:
        description: 'Min score for minor event photos (0–100)'
        required: false
        default: '80'
      dry_run:
        description: 'Dry run: list Drive folders and images, skip all API scoring calls and file writes'
        required: false
        default: 'false'
  schedule:
    # Daily at 06:00 UTC — was weekly; a big camp folder no longer takes
    # months to drain through the per-run budget cap (see GALLERY_*_BUDGET).
    - cron: '0 6 * * *'

concurrency:
  group: content-write
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Curate gallery photos
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GALLERY_YEARS: ${{ github.event.inputs.years }}
          GALLERY_MAX_PRIMARY_EVENT: ${{ github.event.inputs.max_primary || '12' }}
          GALLERY_MAX_PER_EVENT: ${{ github.event.inputs.max_minor || '1' }}
          GALLERY_PREFLIGHT_MODEL: ${{ github.event.inputs.preflight == 'false' && '' || 'gpt-4o-mini' }}
          GALLERY_SCORE_THRESHOLD: ${{ github.event.inputs.score_threshold || '50' }}
          GALLERY_MINOR_THRESHOLD: ${{ github.event.inputs.minor_threshold || '80' }}
          GALLERY_PREFLIGHT_BUDGET: ${{ vars.GALLERY_PREFLIGHT_BUDGET || '600' }}
          GALLERY_HAIKU_BUDGET: ${{ vars.GALLERY_HAIKU_BUDGET || '600' }}
          GALLERY_PREFLIGHT_INTERVAL_MS: ${{ vars.GALLERY_PREFLIGHT_INTERVAL_MS || '1100' }}
          GALLERY_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/curate-gallery.mjs

      - name: Commit updated gallery.json
        if: always() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/content/gallery.json
          [ -f public/content/gallery-pipeline-state.json ] && git add public/content/gallery-pipeline-state.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: curate gallery candidates from Google Drive"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed (concurrent write?), retrying..."
              sleep $((i * 5))
              if [ "$i" = 5 ]; then
                echo "::error::Failed to push after 5 attempts — content-write concurrency not resolved"
                exit 1
              fi
            done
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Workflow failed: ${context.workflow}`;
            const body = `The **${context.workflow}** workflow failed on run [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) (commit ${context.sha}).`;
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'workflow-failure' });
            const existing = issues.data.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['workflow-failure'] });
            }

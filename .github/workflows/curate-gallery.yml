name: Curate Gallery from Google Drive

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'Comma-separated year folders to process (e.g. 2026,2025,2024). Leave blank for current + previous year.'
        required: false
        default: ''
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Curate gallery photos
        env:
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GALLERY_YEARS: ${{ github.event.inputs.years }}
        run: node scripts/curate-gallery.mjs

      - name: Commit updated gallery.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/content/gallery.json
          if git diff --cached --quiet; then
            echo "No changes to gallery.json"
          else
            git commit -m "chore: curate gallery candidates from Google Drive"
            git push
          fi

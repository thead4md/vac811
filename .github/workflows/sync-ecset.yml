name: Sync ECSET Data

on:
  schedule:
    - cron: '0 5 * * 1'  # Every Monday 05:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without writing files or committing'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync ECSET data
        run: node scripts/sync-ecset.mjs
        env:
          ECSET_USERNAME: ${{ secrets.ECSET_USERNAME }}
          ECSET_PASSWORD: ${{ secrets.ECSET_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Commit updated content
        if: always() && inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/content/leaders.json public/content/camps.json \
                  public/content/events.json public/content/settings.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync ECSET data [auto]"
            git pull --rebase origin main
            git push
          fi

name: Sync Gallery from Google Drive

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync gallery photos
        env:
          GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/sync-gallery.mjs

      - name: Commit updated gallery.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/content/gallery.json
          if git diff --cached --quiet; then
            echo "No changes to gallery.json"
          else
            git commit -m "chore: sync gallery from Google Drive"
            git push
          fi

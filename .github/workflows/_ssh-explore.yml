name: (temp) SSH path discovery

# One-off, read-only diagnostic: confirms the SSH login's home directory and
# where /beta/ lives relative to it, before wiring a real rsync-over-ssh
# deploy step. Safe to delete once the real deploy step is confirmed working.
on:
  workflow_dispatch:
  # workflow_dispatch can't be API-triggered until the file exists on the
  # default branch; push on this feature branch fires it in the meantime.
  push:
    branches:
      - claude/audit-upgrade-plan-2026-2b0ibo
    paths:
      - '.github/workflows/_ssh-explore.yml'

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: List remote home directory
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_USER_RAW: ${{ secrets.SSH_USERNAME }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          # Secrets pasted via the GitHub UI sometimes pick up a trailing
          # newline/whitespace, which breaks a bare "$user@host" — strip it.
          SSH_USER=$(printf '%s' "$SSH_USER_RAW" | tr -d '\r\n' | xargs)
          echo "Connecting as user of length ${#SSH_USER} (whitespace-stripped)"
          sshpass -e ssh -p 22 -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "${SSH_USER}@wh22.rackhost.hu" \
            "echo '--- pwd ---'; pwd; echo '--- home listing ---'; ls -la; echo '--- looking for beta ---'; find . -maxdepth 3 -iname 'beta' -o -iname 'index.html' 2>/dev/null | head -20"

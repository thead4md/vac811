name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.event.pull_request.number || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate content JSON
        run: npm run validate:content

      - name: Test
        run: npm test

  # PR builds only ever produce a Cloudflare Pages *preview* deployment
  # (branch != main), never touching production.
  preview:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
          VITE_IMAGE_CDN_URL: ${{ vars.VITE_IMAGE_CDN_URL }}
        run: npm run build

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vac811-beta
          directory: dist
          branch: ${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.url }}`;
            const marker = '<!-- pages-preview-comment -->';
            const body = `${marker}\n🔎 Preview deployed: ${url}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  deploy:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
          VITE_IMAGE_CDN_URL: ${{ vars.VITE_IMAGE_CDN_URL }}
        run: npm run build

      # Cloudflare Pages keeps every deployment and supports instant rollback
      # from the dashboard/API, so unlike the old Rackhost FTP setup there's
      # no need to archive an artifact here for manual redeploy.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vac811-beta
          directory: dist
          branch: main

      - name: Smoke-check the deployed build
        run: |
          set -e
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /tmp/beta_index.html -w '%{http_code}' https://beta.vac811.hu/)
            if [ "$status" = "200" ]; then break; fi
            echo "Attempt $i: got HTTP $status, retrying in 10s..."
            sleep 10
          done
          if [ "$status" != "200" ]; then
            echo "::error::https://beta.vac811.hu/ returned HTTP $status after deploy"
            exit 1
          fi
          main_js=$(grep -oE '/assets/[^"]+\.js' /tmp/beta_index.html | head -1)
          if [ -z "$main_js" ]; then
            echo "::error::Could not find the main JS bundle reference in the deployed index.html"
            exit 1
          fi
          js_status=$(curl -s -o /dev/null -w '%{http_code}' "https://beta.vac811.hu${main_js}")
          if [ "$js_status" != "200" ]; then
            echo "::error::Main JS bundle ${main_js} returned HTTP $js_status"
            exit 1
          fi
          echo "Smoke check passed: / and ${main_js} both return 200."

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Workflow failed: ${context.workflow}`;
            const body = `The **${context.workflow}** workflow failed on run [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) (commit ${context.sha}).`;
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'workflow-failure' });
            const existing = issues.data.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['workflow-failure'] });
            }

# Cloudflare Pages project config for vac811-beta.
#
# This exists so `wrangler pages deploy` (used by .github/workflows/deploy.yml)
# knows the project name + output dir and compiles the Pages Functions under
# functions/ (see functions/content/[file].js — the content KV fast-path).
#
# NOTE: this is the *Pages* project config. The two standalone Workers keep
# their own wrangler.toml under workers/google-git-proxy/ and workers/image-cdn/.

name = "vac811-beta"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"

# ─── Workers KV: content fast-path ───────────────────────────────────────────
# The CONTENT namespace backs functions/content/[file].js. Content edits are
# written to it by .github/workflows/sync-content-kv.yml so they go live in
# seconds without a full rebuild; git stays the source of truth and the static
# files in dist/content/ remain the automatic fallback on a KV miss.
#
# To create the namespace, run:
#   wrangler kv namespace create CONTENT
#   wrangler kv namespace create CONTENT --preview
#
# Then fill in the returned namespace IDs below:

[[kv_namespaces]]
binding = "CONTENT"
id = "YOUR_PRODUCTION_NAMESPACE_ID"
preview_id = "YOUR_PREVIEW_NAMESPACE_ID"

# ─── Environment Variables & Secrets ─────────────────────────────────────────
# Secrets are read from .env.production and .env.preview files
# See .env.example for the full list of required variables

[env.production]
vars = { ENVIRONMENT = "production" }

[env.preview]
vars = { ENVIRONMENT = "preview" }

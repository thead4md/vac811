backend:
  name: github
  repo: thead4md/vac811
  branch: main
  base_url: https://sveltia-cms-auth.dudas-adam99.workers.dev
  site_domain: vac811.hu/beta


# Where Sveltia CMS stores uploaded images
media_folder: public/images/uploads
public_folder: /images/uploads

# Local dev: Sveltia CMS doesn't use decap-server/local_backend (removed —
# unsupported and ignored). Run `npm run dev`, open /admin/index.html in
# Chrome or Edge, and click "Work with Local Repository" to edit the working
# tree directly via the File System Access API (Chromium-only).
# https://sveltiacms.app/en/docs/workflows/local

collections:

  # ─── LEADERS ────────────────────────────────────────────────────────────────
  - name: leaders
    label: Vezetők
    label_singular: Vezető
    description: "Törzs és rajvezetők szerkesztése."
    files:
      - name: leaders
        label: Vezetők listája
        file: public/content/leaders.json
        fields:
          - label: Vezetők
            name: leaders
            widget: list
            label_singular: Vezető
            fields:
              - { label: Teljes név, name: name, widget: string }
              - { label: Beosztás, name: role, widget: string }
              - { label: Fénykép, name: photo, widget: image, required: false, hint: "Portré (négyzetes kép a legjobb). Üresen hagyva a monogram jelenik meg." }
              - { label: E-mail, name: email, widget: string, required: false }
              - { label: Raj, name: raj, widget: string, required: false, hint: "Pl. Göncöl raj (hagyd üresen ha nem rajvezető)" }
              - { label: Törzstag?, name: isStaff, widget: boolean, default: false, hint: "Bejelölve → csapatvezető törzs tagja" }

  # ─── CAMPS ──────────────────────────────────────────────────────────────────
  - name: camps
    label: Nyári táborok
    label_singular: Tábor
    description: "Tábori évkönyv szerkesztése."
    files:
      - name: camps
        label: Táborok listája
        file: public/content/camps.json
        fields:
          - label: Táborok
            name: camps
            widget: list
            label_singular: Tábor
            summary: "{{fields.year}} – {{fields.location}}"
            fields:
              - { label: Év, name: year, widget: number, value_type: int, hint: "Automatikusan frissül az ECSET szinkronból (heti/napi robot) — a kézi módosítás felülíródhat." }
              - { label: Helyszín, name: location, widget: string, hint: "Automatikusan frissül az ECSET szinkronból — a kézi módosítás felülíródhat." }
              - { label: Táborparancsnok, name: commander, widget: string, hint: "Automatikusan frissül az ECSET szinkronból — a kézi módosítás felülíródhat." }
              - { label: Téma, name: theme, widget: string, hint: "Ezt a mezőt az ECSET nem ismeri — csak itt szerkeszthető, a szinkron nem írja felül." }
              - { label: Résztvevők száma, name: participants, widget: number, value_type: int, required: false, hint: "0 = nem ismert. Automatikusan frissül az ECSET szinkronból." }
              - { label: Megjegyzés, name: notes, widget: string, required: false, hint: "Ezt a mezőt az ECSET nem ismeri — csak itt szerkeszthető, a szinkron nem írja felül." }

  # ─── EVENTS ─────────────────────────────────────────────────────────────────
  - name: events
    label: Programok és hírek
    label_singular: Program
    description: "Közelgő programok és hírek szerkesztése."
    files:
      - name: events
        label: Programok listája
        file: public/content/events.json
        fields:
          - label: Programok
            name: events
            widget: list
            label_singular: Program
            summary: "{{fields.date}} – {{fields.title}}"
            fields:
              - { label: Azonosító (ID), name: id, widget: string, hint: "Egyedi, kötőjeles azonosító, pl. tabor-2026" }
              - { label: Cím, name: title, widget: string }
              - { label: Dátum, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: false, hint: "Válaszd ki a naptárból. Több napos programnál a kezdő nap." }
              - { label: Dátum (megjelenített), name: dateDisplay, widget: string, hint: "Ahogy a látogató látja, pl. 2026. július 15–20." }
              - { label: Leírás, name: description, widget: text }
              - label: Kategória
                name: category
                widget: select
                options:
                  - { label: Mise, value: mise }
                  - { label: Portya, value: portya }
                  - { label: Verseny, value: verseny }
                  - { label: Tábor, value: tábor }
                  - { label: Egyéb, value: egyéb }

  # ─── RAJOK ──────────────────────────────────────────────────────────────────
  - name: rajok
    label: Rajok
    label_singular: Raj
    description: "A csapat rajai és leírásaik."
    files:
      - name: rajok
        label: Rajok listája
        file: public/content/rajok.json
        fields:
          - label: Rajok
            name: rajok
            widget: list
            label_singular: Raj
            fields:
              - { label: Raj neve, name: name, widget: string }
              - { label: Leírás, name: description, widget: text }
              - label: Korosztály
                name: ageGroup
                widget: select
                options:
                  - Fiatalabb korosztály
                  - Középső korosztály
                  - Idősebb korosztály
                  - Felnőtt
                  - Felnőtt / Senior

  # ─── SETTINGS ───────────────────────────────────────────────────────────────
  - name: settings
    label: Oldal beállítások
    description: "Elérhetőségek, közösségi média, statisztikák."
    files:
      - name: settings
        label: Alap beállítások
        file: public/content/settings.json
        fields:
          - { label: Csapat neve, name: siteName, widget: string }
          - { label: Szlogen, name: tagline, widget: string }
          - { label: Cím, name: address, widget: string, hint: "Kezdetben az ECSET-ből töltődik fel; miután itt beállítod, a szerkesztői érték az irányadó és a szinkron többé nem írja felül." }
          - { label: Általános e-mail, name: emailMain, widget: string, hint: "Kezdetben az ECSET-ből töltődik fel; miután itt beállítod, a szerkesztői érték az irányadó és a szinkron többé nem írja felül." }
          - { label: Csapatparancsnok e-mail, name: emailCommander, widget: string }
          - { label: Facebook URL, name: facebook, widget: string, hint: "Kezdetben az ECSET-ből töltődik fel; miután itt beállítod, a szerkesztői érték az irányadó és a szinkron többé nem írja felül." }
          - { label: Instagram URL, name: instagram, widget: string, hint: "Kezdetben az ECSET-ből töltődik fel; miután itt beállítod, a szerkesztői érték az irányadó és a szinkron többé nem írja felül." }
          - { label: Aktív cserkészek száma, name: activeMemberCount, widget: number, value_type: int, hint: "Automatikusan frissül az ECSET szinkronból — a kézi módosítás felülíródhat." }
          - { label: Aktív őrsök száma, name: activeOrsCount, widget: number, value_type: int, hint: "Automatikusan frissül az ECSET szinkronból — a kézi módosítás felülíródhat." }
          - { label: Rajok száma, name: rajCount, widget: number, value_type: int, hint: "A rajok listája alapján automatikusan frissül — a kézi módosítás felülíródhat." }
          - { label: Alapítás éve, name: foundedYear, widget: number, value_type: int }

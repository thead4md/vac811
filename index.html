<!doctype html>
<html lang="hu" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Set the theme before first paint to avoid a light-mode flash for dark-mode users -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <!-- Primary SEO -->
    <title>811. Szent József Cserkészcsapat – Vác</title>
    <meta name="description" content="A 811. Szent József Cserkészcsapat Vác egyik legnagyobb ifjúsági szervezete. 232 aktív cserkész, 11 raj, 1929 óta. Csatlakozz a közösséghez!" />
    <meta name="keywords" content="cserkész, vác, 811, szent józsef, cserkészcsapat, ifjúság, tábor, közösség" />
    <meta name="author" content="811. Szent József Cserkészcsapat" />
    <!-- /beta is staging behind the WordPress apex — keep it out of search results -->
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://vac811.hu/beta/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vac811.hu/" />
    <meta property="og:title" content="811. Szent József Cserkészcsapat – Vác" />
    <meta property="og:description" content="A 811. Szent József Cserkészcsapat Vác egyik legnagyobb ifjúsági szervezete. 232 aktív cserkész, 11 raj, 1929 óta." />
    <meta property="og:locale" content="hu_HU" />
    <meta property="og:site_name" content="811. Cserkészcsapat – Vác" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="811. Szent József Cserkészcsapat – Vác" />
    <meta name="twitter:description" content="1929 óta cserkészkedünk Vácott. Csatlakozz te is!" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "811. Szent József Cserkészcsapat",
      "alternateName": "Vác 811",
      "url": "https://vac811.hu",
      "email": "811@cserkesz.hu",
      "foundingDate": "1929",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Dr. Csányi László krt. 58.",
        "addressLocality": "Vác",
        "postalCode": "2600",
        "addressCountry": "HU"
      },
      "sameAs": [
        "https://facebook.com/vac811",
        "https://instagram.com/811szentjozsef"
      ]
    }
    </script>

    <!-- Preload settings.json: Home's hero stats (member/raj/ors counts) read
         from it via useContent, and without this they visibly pop in after
         the JS bundle parses and only then kicks off the fetch (finding P8). -->
    <link rel="preload" href="%BASE_URL%content/settings.json" as="fetch" crossorigin />

    <!-- Gallery images: img.vac811.hu (image-cdn Worker) once deployed, else Drive directly -->
    <link rel="preconnect" href="https://img.vac811.hu" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />

    <!-- Instagram feed (Behold widget on /galeria): warm up the script + feed host -->
    <link rel="preconnect" href="https://w.behold.so" crossorigin />

    <!-- Fonts: Sora (display) + General Sans (body), self-hosted (src/styles/fonts.css) —
         previously a render-blocking third-party Fontshare stylesheet (audit finding P6). -->

    <!-- Favicon inline SVG -->
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />

    <!-- Theme color -->
    <meta name="theme-color" content="#2d6a4f" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

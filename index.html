<!doctype html>
<html lang="hu" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Set the theme before first paint to avoid a light-mode flash for dark-mode users -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <!-- Primary SEO — title/description/canonical and og/twitter title+description
         are injected per route at prerender time by RouteHead (src/App.tsx) via
         vite-react-ssg's <Head>. Only site-wide constants live statically here. -->
    <meta name="keywords" content="cserkész, vác, 811, szent józsef, cserkészcsapat, ifjúság, tábor, közösség" />
    <meta name="author" content="811. Szent József Cserkészcsapat" />
    <!-- beta.vac811.hu is staging alongside the WordPress apex — keep it out of search results -->
    <meta name="robots" content="noindex" />

    <!-- Open Graph (site-wide constants; per-route og:title/description/url set by RouteHead) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="hu_HU" />
    <meta property="og:site_name" content="811. Cserkészcsapat – Vác" />
    <meta property="og:image" content="https://beta.vac811.hu/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://beta.vac811.hu/og-image.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "811. Szent József Cserkészcsapat",
      "alternateName": "Vác 811",
      "url": "https://vac811.hu",
      "email": "811@cserkesz.hu",
      "foundingDate": "1929",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Dr. Csányi László krt. 58.",
        "addressLocality": "Vác",
        "postalCode": "2600",
        "addressCountry": "HU"
      },
      "sameAs": [
        "https://facebook.com/vac811",
        "https://instagram.com/811szentjozsef"
      ]
    }
    </script>

    <!-- Preload settings.json: Home's hero stats (member/raj/ors counts) read
         from it via useContent, and without this they visibly pop in after
         the JS bundle parses and only then kicks off the fetch (finding P8). -->
    <link rel="preload" href="%BASE_URL%content/settings.json" as="fetch" crossorigin />

    <!-- Gallery images: img.vac811.hu (image-cdn Worker) once deployed, else Drive directly -->
    <link rel="preconnect" href="https://img.vac811.hu" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />

    <!-- Instagram media (synced posts on /galeria) is served from Instagram/Meta's own CDN -->
    <link rel="preconnect" href="https://scontent.cdninstagram.com" crossorigin />

    <!-- Fonts: Sora (display) + General Sans (body), self-hosted (src/styles/fonts.css) —
         previously a render-blocking third-party Fontshare stylesheet (audit finding P6). -->

    <!-- Favicon inline SVG -->
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />

    <!-- Theme color -->
    <meta name="theme-color" content="#2d6a4f" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
